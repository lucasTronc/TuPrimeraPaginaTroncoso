<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>{{titulo}}</h1>
    <h1>Links a vistas</h1>
        <a href="{% url 'index' %}">Inicio</a> | 
        <a href="{% url 'usuarios' %}">Usuarios</a>
        <a href="{% url 'crear_usuario' %}">Crear Usuario</a>
        <a href="{% url 'crear_post' %}">Crear Post</a>
        <a href="{% url 'crear_categoria' %}">Crear Categoria</a>
        <a href="{% url 'buscar_post' %}">Buscar Post</a>
   <ul>
    {% for post in posts %}
        <li>
            {{ post.titulo }} 
            <a href="{% url 'editar_post' post.id %}">Editar</a> | 
            <a href="{% url 'eliminar_post' post.id %}">Eliminar</a>
        </li>
    {% empty %}
        <li>No hay posts todavía. <a href="{% url 'crear_post' %}">¡Creá uno!</a></li>
    {% endfor %}

</body>
</html>
